name: Deploy → Staging

on:
  push:
    branches: [develop]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-staging"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.159.0'
          extended: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install staticrypt
        run: npm install

      - name: Build Hugo (staging, amb drafts)
        run: |
          hugo --minify --baseURL "https://112books.github.io/llumatics-web/" --buildDrafts

      - name: Encrypt with staticrypt (staging)
        run: |
          npx staticrypt public/**/*.html \
            --password "${{ secrets.SITE_PASSWORD }}" \
            --config .staticrypt.json \
            --directory public
        env:
          SITE_PASSWORD: ${{ secrets.SITE_PASSWORD }}

      - name: Deploy to GitHub Pages (branca gh-pages-staging)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages-staging
          destination_dir: .
