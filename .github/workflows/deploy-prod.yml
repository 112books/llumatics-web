name: Deploy → Producció (GitHub Pages)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.159.0'
          extended: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install staticrypt
        run: npm install

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build Hugo
        env:
          HUGO_BASEURL: ${{ steps.pages.outputs.base_url }}/
        run: |
          hugo --minify --baseURL "$HUGO_BASEURL"

      - name: Encrypt with staticrypt
        # SITE_PASSWORD és un GitHub Secret: Settings → Secrets → Actions → New
        # Nom: SITE_PASSWORD  Valor: la contrasenya que vulguis
        run: |
          npx staticrypt public/**/*.html \
            --password "${{ secrets.SITE_PASSWORD }}" \
            --config .staticrypt.json \
            --directory public
        env:
          SITE_PASSWORD: ${{ secrets.SITE_PASSWORD }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
