<!DOCTYPE html>
<html lang="{{ .Language.Lang }}">
<head>
  {{ partial "head.html" . }}
</head>
<body>
  {{ partial "header.html" . }}

  <main id="main-content"{{ if and (ne .Kind "home") (ne .Type "tallers") }} class="page-main--offset"{{ end }}>
    {{ block "main" . }}{{ end }}
  </main>

  {{ partial "footer.html" . }}

  <button class="back-to-top" id="js-back-to-top" aria-label="Tornar al principi">
    <svg class="back-to-top__ring" viewBox="0 0 48 48" width="48" height="48" aria-hidden="true">
      <circle class="back-to-top__track"    cx="24" cy="24" r="21"/>
      <circle class="back-to-top__progress" cx="24" cy="24" r="21" id="js-btt-progress"/>
    </svg>
    <span class="back-to-top__arrow">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="currentColor">
        <polygon points="6,1 12,11 0,11"/>
      </svg>
    </span>
  </button>

  {{/* Overlay de cerca */}}
  <div id="search-overlay" class="search-overlay" role="dialog" aria-modal="true" aria-label="{{ i18n "search_label" | default "Cercar" }}" hidden>
    <div class="search-box">
      <input id="search-input" class="search-input" type="search"
             placeholder="{{ i18n "search_placeholder" | default "Cerca tallers i entrades…" }}"
             autocomplete="off" spellcheck="false">
      <button class="search-close" aria-label="{{ i18n "search_close" | default "Tancar cerca" }}">&#215;</button>
      <ul id="search-results" class="search-results" role="listbox" aria-live="polite"></ul>
    </div>
  </div>
  <script>
    window.__searchURL = "{{ printf "%s%s/index.json" (strings.TrimSuffix "/" site.BaseURL) $.Site.LanguagePrefix }}";
  </script>

  {{/* Lightbox compartit */}}
  <div id="js-lightbox" role="dialog" aria-modal="true" aria-label="Imatge ampliada" style="display:none;">
    <button class="lb-btn lb-btn--prev" id="js-lb-prev" aria-label="Anterior">&#8249;</button>
    <img id="js-lb-img" src="" alt="">
    <button class="lb-btn lb-btn--next" id="js-lb-next" aria-label="Següent">&#8250;</button>
    <button class="lb-btn lb-btn--close" id="js-lb-close" aria-label="Tancar">&#215;</button>
    <span class="lb-counter" id="js-lb-counter"></span>
  </div>

</body>
</html>
