{{ if site.Params.sitePassword }}
<div class="pw-gate" id="pw-gate">
  <div class="pw-gate__box">
    <div class="pw-gate__logo">
      {{ if fileExists "static/images/llumatics-logo.svg" }}
        <img src="{{ site.BaseURL }}images/llumatics-logo.svg" alt="Llumàtics" width="56" height="56">
      {{ end }}
      <span>{{ site.Title }}</span>
    </div>
    <p class="pw-gate__label">Accés restringit. Introdueix la contrasenya.</p>
    <div class="pw-gate__row">
      <input
        class="pw-gate__input"
        type="password"
        id="pw-input"
        placeholder="Contrasenya"
        autocomplete="off"
        autofocus>
      <button class="pw-gate__btn" id="pw-btn" type="button">Entrar</button>
    </div>
    <p class="pw-gate__error" id="pw-error" hidden>Contrasenya incorrecta.</p>
  </div>
</div>

<style>
.pw-gate {
  position: fixed;
  inset: 0;
  background: #FAFAF8;
  z-index: 9999;
  display: flex;
  align-items: center;
  justify-content: center;
}
.pw-gate__box {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1.25rem;
  width: 100%;
  max-width: 360px;
  padding: 2rem;
}
.pw-gate__logo {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  font-family: 'Playfair Display', Georgia, serif;
  font-size: 1.5rem;
  font-weight: 700;
  color: #1A1A18;
  margin-bottom: 0.5rem;
}
.pw-gate__label {
  font-size: 0.875rem;
  color: #6B6B65;
  text-align: center;
}
.pw-gate__row {
  display: flex;
  gap: 0.5rem;
  width: 100%;
}
.pw-gate__input {
  flex: 1;
  padding: 0.75rem 1rem;
  border: 1px solid #E0DED8;
  border-radius: 4px;
  font-size: 1rem;
  background: #fff;
  color: #1A1A18;
  outline: none;
  transition: border-color 200ms;
}
.pw-gate__input:focus { border-color: #C8A96E; }
.pw-gate__btn {
  padding: 0.75rem 1.25rem;
  background: #C8A96E;
  color: #fff;
  border: none;
  border-radius: 4px;
  font-size: 0.875rem;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  transition: background 200ms;
}
.pw-gate__btn:hover { background: #A8893E; }
.pw-gate__error {
  font-size: 0.875rem;
  color: #C0392B;
}
@keyframes shake {
  0%,100% { transform: translateX(0); }
  25%      { transform: translateX(-6px); }
  75%      { transform: translateX(6px); }
}
.pw-gate__box--shake { animation: shake 0.3s ease; }
</style>

<script>
(function(){
  var KEY = 'llumatics_pw_ok';
  var PWD = '{{ site.Params.sitePassword }}';
  var gate = document.getElementById('pw-gate');

  if (localStorage.getItem(KEY) === '1') {
    gate.remove();
    return;
  }

  function tryAccess() {
    var val = document.getElementById('pw-input').value;
    if (val === PWD) {
      localStorage.setItem(KEY, '1');
      gate.remove();
    } else {
      var box = gate.querySelector('.pw-gate__box');
      var err = document.getElementById('pw-error');
      err.hidden = false;
      box.classList.remove('pw-gate__box--shake');
      void box.offsetWidth;
      box.classList.add('pw-gate__box--shake');
      document.getElementById('pw-input').value = '';
      document.getElementById('pw-input').focus();
    }
  }

  document.getElementById('pw-btn').addEventListener('click', tryAccess);
  document.getElementById('pw-input').addEventListener('keydown', function(e){
    if (e.key === 'Enter') tryAccess();
  });
})();
</script>
{{ end }}
