baseURL = "https://llumatics.com/"
title = "Llumàtics"
theme = "llumatics"
enableRobotsTXT = true
enableGitInfo = false
summaryLength = 70

defaultContentLanguage = "ca"
defaultContentLanguageInSubdir = false

[pagination]
  pagerSize = 12

[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]
  taxonomy = ["HTML"]

# ── Idiomes ──────────────────────────────────────────────────────────────────

[languages]

  [languages.ca]
    contentDir = "content/ca"
    languageName = "Català"
    languageCode = "ca"
    weight = 1
    title = "Llumàtics"
    [languages.ca.params]
      description = "Escola de fotografia. Tallers, laboratori i formació."
      locale = "ca_ES"

  [languages.es]
    contentDir = "content/es"
    languageName = "Castellano"
    languageCode = "es"
    weight = 2
    title = "Llumàtics"
    [languages.es.params]
      description = "Escuela de fotografía. Talleres, laboratorio y formación."
      locale = "es_ES"

  [languages.en]
    contentDir = "content/en"
    languageName = "English"
    languageCode = "en"
    weight = 3
    title = "Llumàtics"
    [languages.en.params]
      description = "Photography school. Workshops, darkroom and training."
      locale = "en_US"

# ── Paràmetres globals ────────────────────────────────────────────────────────

[params]
  author = "Llumàtics"
  logo = "/images/llumatics-logo.svg"
  logoAlt = "Llumàtics"
  contactEmail = "info@llumatics.com"
  instagram = "https://www.instagram.com/llumaticscat"
  newsletterService = "brevo"
  formService = "tally"
  tallyFormNewsletter = ""
  tallyFormContact = ""
  tallyFormGiftVoucher = ""

[taxonomies]
  tag = "tags"
  category = "categories"
  level = "levels"
  technique = "techniques"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    style = "monokai"
    lineNos = false

[minify]
  disableCSS = false
  disableHTML = false
  disableJS = false

